<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pitcher List's Reliever Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,900&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Surfaces */
  --surface-1: #13152A;
  --surface-2: #181A2C;
  --surface-3: #21243A;

  /* Brand accents */
  --cyan: #55e8ff;
  --cyan-header: #73efff;
  --amber: #ffc277;
  --amber-muted: rgba(255,194,119,0.82);

  /* Text */
  --text-nav: #cbd7fd;
  --text-inactive-tab: rgba(217,221,238,0.86);
  --text-cell: #f0f1f5;
  --text-player: rgba(246,248,255,0.96);
  --text-team: rgba(180,187,215,0.68);
  --text-zero: rgba(164,170,202,0.7);
  --text-bn: rgba(226,230,244,0.76);
  --text-bn-player: rgba(238,241,250,0.82);
  --text-bn-team: rgba(166,172,202,0.54);
  --text-bn-zero: rgba(150,156,188,0.56);

  /* Borders */
  --border-sidebar: rgba(85,232,255,0.12);
  --border-tab: rgba(255,255,255,0.13);
  --border-table: rgba(118,138,190,0.22);
  --border-row: rgba(140,165,210,0.11);
  --border-thead: rgba(157,244,255,0.22);

  /* Row fills */
  --row-a: rgba(48,58,97,0.46);
  --row-b: rgba(42,51,85,0.38);
  --row-bn: rgba(34,40,63,0.3);

  /* Semantic */
  --green: #34d399;
  --red: #f4707c;
  --blue: #3da9f5;
  --violet: #a78bfa;
  --gold: #f5b950;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background-color: var(--surface-1);
  background-image: url("data:image/svg+xml,%3Csvg%20width%3D%222364%22%20height%3D%222589%22%20viewBox%3D%220%200%202364%202589%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%0A%20%20%3Cdefs%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%22base%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%222364%22%20y2%3D%222589%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23171A2B%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2248%25%22%20stop-color%3D%22%2321243A%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23181B2C%22/%3E%0A%20%20%20%20%3C/linearGradient%3E%0A%0A%20%20%20%20%3CradialGradient%20id%3D%22r1%22%20cx%3D%220%22%20cy%3D%220%22%20r%3D%221%22%20gradientUnits%3D%22userSpaceOnUse%22%0A%20%20%20%20%20%20gradientTransform%3D%22translate%28425.52%20207.12%29%20scale%281702.08%201190.94%29%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23BED7FF%22%20stop-opacity%3D%220.085%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2252%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%3C/radialGradient%3E%0A%0A%20%20%20%20%3CradialGradient%20id%3D%22r2%22%20cx%3D%220%22%20cy%3D%220%22%20r%3D%221%22%20gradientUnits%3D%22userSpaceOnUse%22%0A%20%20%20%20%20%20gradientTransform%3D%22translate%281796.64%20466.02%29%20scale%281371.12%20984.82%29%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%2378A5EB%22%20stop-opacity%3D%220.055%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2254%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%3C/radialGradient%3E%0A%0A%20%20%20%20%3CradialGradient%20id%3D%22r3%22%20cx%3D%220%22%20cy%3D%220%22%20r%3D%221%22%20gradientUnits%3D%22userSpaceOnUse%22%0A%20%20%20%20%20%20gradientTransform%3D%22translate%28472.8%202278.32%29%20scale%281654.8%201346.28%29%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%2391B9F5%22%20stop-opacity%3D%220.06%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2256%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%3C/radialGradient%3E%0A%0A%20%20%20%20%3CradialGradient%20id%3D%22r4%22%20cx%3D%220%22%20cy%3D%220%22%20r%3D%221%22%20gradientUnits%3D%22userSpaceOnUse%22%0A%20%20%20%20%20%20gradientTransform%3D%22translate%282080.32%202122.98%29%20scale%281087.44%201605.18%29%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23D2E4FF%22%20stop-opacity%3D%220.052%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2255%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%3C/radialGradient%3E%0A%0A%20%20%20%20%3ClinearGradient%20id%3D%22l1%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%222364%22%20y2%3D%222589%22%0A%20%20%20%20%20%20gradientUnits%3D%22userSpaceOnUse%22%20gradientTransform%3D%22rotate%28-17%201182%201294.5%29%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23FFFFFF%22%20stop-opacity%3D%220.045%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2218%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2238%25%22%20stop-color%3D%22%2387AFF0%22%20stop-opacity%3D%220.052%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2261%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23D2E4FF%22%20stop-opacity%3D%220.04%22/%3E%0A%20%20%20%20%3C/linearGradient%3E%0A%0A%20%20%20%20%3ClinearGradient%20id%3D%22l2%22%20x1%3D%220%22%20y1%3D%222589%22%20x2%3D%222364%22%20y2%3D%220%22%0A%20%20%20%20%20%20gradientUnits%3D%22userSpaceOnUse%22%20gradientTransform%3D%22rotate%289%201182%201294.5%29%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2228%25%22%20stop-color%3D%22%236E91D7%22%20stop-opacity%3D%220.045%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2249%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%2273%25%22%20stop-color%3D%22%23E6F0FF%22%20stop-opacity%3D%220.032%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%22100%25%22%20stop-opacity%3D%220%22/%3E%0A%20%20%20%20%3C/linearGradient%3E%0A%20%20%3C/defs%3E%0A%0A%20%20%3Crect%20width%3D%222364%22%20height%3D%222589%22%20fill%3D%22url%28%23base%29%22/%3E%0A%20%20%3Crect%20width%3D%222364%22%20height%3D%222589%22%20fill%3D%22url%28%23l2%29%22/%3E%0A%20%20%3Crect%20width%3D%222364%22%20height%3D%222589%22%20fill%3D%22url%28%23l1%29%22/%3E%0A%20%20%3Crect%20width%3D%222364%22%20height%3D%222589%22%20fill%3D%22url%28%23r4%29%22/%3E%0A%20%20%3Crect%20width%3D%222364%22%20height%3D%222589%22%20fill%3D%22url%28%23r3%29%22/%3E%0A%20%20%3Crect%20width%3D%222364%22%20height%3D%222589%22%20fill%3D%22url%28%23r2%29%22/%3E%0A%20%20%3Crect%20width%3D%222364%22%20height%3D%222589%22%20fill%3D%22url%28%23r1%29%22/%3E%0A%3C/svg%3E%0A");
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: var(--text-cell);
  font-family: 'Work Sans', sans-serif;
  font-size: 14px;
  line-height: 1.2;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(85,232,255,0.15); border-radius: 3px; }

/* ── Page header ───────────────────────────────────────── */
.league-header { flex-shrink: 0; padding: 24px 28px 0; }
.league-title  { font: 700 36px/36px 'DM Sans', sans-serif; color: var(--cyan); margin-bottom: 10px; }
.league-meta   { font: 400 16px 'DM Sans', sans-serif; color: rgba(192,196,216,0.72); letter-spacing: 0.32px; margin-bottom: 18px; min-height: 19px; }
.section-title { font: 900 24px/1.2 'DM Sans', sans-serif; color: var(--cyan); margin-bottom: 12px; }

/* ── Tabs ──────────────────────────────────────────────── */
.tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border-tab); }
.tab {
  font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 17px;
  color: var(--text-inactive-tab); letter-spacing: 0.34px;
  padding: 14px 0 16px; margin-right: 40px;
  cursor: pointer; position: relative; user-select: none;
}
.tab:last-child { margin-right: 0; }
.tab:hover { color: #eef2fb; }
.tab.active { font-weight: 700; color: var(--amber); }
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: -5px; right: -5px;
  height: 6px;
  background: var(--amber);
  border-radius: 999px 999px 0 0;
  box-shadow: 0 0 14px rgba(255,194,119,0.42);
}

/* ── Content ───────────────────────────────────────────── */
.content { padding: 20px 28px 32px; }

/* ── Tables ────────────────────────────────────────────── */
.table-wrap {
  border: 1px solid var(--border-table); border-radius: 10px;
  box-shadow: 0 0 0 1px rgba(7,9,18,0.3), 0 18px 30px rgba(0,0,0,0.28);
  overflow: hidden; position: relative;
}
.table-wrap::after {
  content: ''; position: absolute; inset: 0; border-radius: 10px; pointer-events: none;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), inset 0 1px 0 rgba(255,255,255,0.08);
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  background: #2E3658;
  font: 600 12px 'Work Sans', sans-serif; color: var(--cyan-header);
  height: 34.5px; padding: 0 14px;
  border-bottom: 1px solid var(--border-thead);
  box-shadow: inset 0 -1px 0 rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
  text-align: left; white-space: nowrap; position: sticky; top: 0; z-index: 2;
}
th.num { text-align: right; }
th.sortable { cursor: pointer; }
th .arr { color: var(--amber); }
tbody tr:nth-child(odd)  { background: var(--row-a); }
tbody tr:nth-child(even) { background: var(--row-b); }
tbody tr { border-bottom: 1px solid var(--border-row); }
tbody tr:last-child { border-bottom: none; }
td { padding: 10px 14px; font: 400 14px 'Work Sans', sans-serif; color: var(--text-cell); white-space: nowrap; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.zero, .zero { color: var(--text-zero); }
.player-cell { min-width: 168px; }
.player-name {
  font: 600 16px/1 'Work Sans', sans-serif; color: var(--text-player);
  margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 230px;
}
.player-team {
  font: 500 14px 'Work Sans', sans-serif; color: var(--text-team);
  letter-spacing: 0.115px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
tr.data-row { height: 62px; }
.up { color: var(--green); }
.down { color: var(--red); }

/* ── True-SP flag (mirrors the sheet's orange rows) ────── */
.board-controls { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 12px; }
.sp-toggle {
  display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
  font: 500 13px 'Work Sans', sans-serif; color: var(--text-nav);
  background: var(--surface-3); border: 1px solid var(--border-tab);
  border-radius: 8px; padding: 7px 12px;
}
.sp-toggle:hover { border-color: rgba(255,194,119,0.4); color: #eef2fb; }
.sp-toggle input { accent-color: var(--amber); width: 15px; height: 15px; cursor: pointer; margin: 0; }
.sp-badge {
  display: inline-block; margin-left: 8px; vertical-align: middle;
  font: 700 9px/1 'DM Sans', sans-serif; letter-spacing: 0.06em;
  color: var(--amber); background: rgba(255,194,119,0.12);
  border: 1px solid rgba(255,194,119,0.42); border-radius: 5px; padding: 2px 5px;
}
tbody tr.sp-flagged { background: rgba(255,194,119,0.085) !important; }
tbody tr.sp-flagged td:first-child { box-shadow: inset 3px 0 0 rgba(255,194,119,0.75); }

/* ── Footnotes under tables ────────────────────────────── */
.foot-note {
  font: 400 13px 'Work Sans', sans-serif; color: var(--text-zero);
  margin-top: 12px; line-height: 1.5;
}
.foot-note a { color: var(--cyan); text-decoration: none; }

/* ── Depth chart cards ─────────────────────────────────── */
.bp-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
  gap: 16px; margin-bottom: 30px;
}
.card {
  position: relative; background: var(--surface-3);
  border: 1px solid var(--border-table); border-radius: 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  padding: 14px 14px 12px;
}
.card::before {
  content: ''; position: absolute; left: 33.5%; width: 33%; bottom: -6px; height: 14px;
  border-radius: 50%; background: rgba(0,0,0,0.45); filter: blur(10px); z-index: -1;
}
.bp-team {
  font: 600 16px/1.25 'Work Sans', sans-serif; color: var(--text-player);
  margin-bottom: 8px; padding-right: 4px;
}
.bp-row { display: flex; align-items: center; gap: 8px; padding: 4.5px 0; }
.bp-role {
  font: 700 10px 'DM Sans', sans-serif; letter-spacing: 0.05em;
  border-radius: 6px; padding: 2.5px 8px; min-width: 26px; text-align: center;
  background: var(--surface-3); border: 1px solid var(--border-tab); color: var(--text-nav);
}
.bp-role.cl { color: var(--cyan);  border-color: rgba(85,232,255,0.4);  background: rgba(85,232,255,0.08); }
.bp-role.co { color: var(--blue);  border-color: rgba(61,169,245,0.4);  background: rgba(61,169,245,0.08); }
.bp-role.su { color: var(--amber); border-color: rgba(255,194,119,0.4); background: rgba(255,194,119,0.08); }
.bp-name { font: 500 14px 'Work Sans', sans-serif; color: var(--text-cell); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.bp-hand { font: 600 11px 'Work Sans', sans-serif; color: var(--text-zero); }
.bp-hand.lefty { color: var(--gold); }
.chip {
  display: inline-block; font: 700 10px 'DM Sans', sans-serif; letter-spacing: 0.05em;
  border-radius: 6px; padding: 2.5px 8px; margin-bottom: 10px;
  border: 1px solid var(--border-tab); background: var(--surface-3); color: var(--text-nav);
}
.chip.stable    { color: var(--green);  border-color: rgba(52,211,153,0.45); background: rgba(52,211,153,0.09); }
.chip.cautious  { color: var(--amber);  border-color: rgba(255,194,119,0.45); background: rgba(255,194,119,0.09); }
.chip.unstable  { color: var(--red);    border-color: rgba(244,112,124,0.45); background: rgba(244,112,124,0.09); }
.chip.committee { color: var(--violet); border-color: rgba(167,139,250,0.45); background: rgba(167,139,250,0.09); }
.chip.interim   { color: var(--gold);   border-color: rgba(245,185,80,0.45);  background: rgba(245,185,80,0.09); }
.card.stable    { border-top: 2px solid rgba(52,211,153,0.55); }
.card.cautious  { border-top: 2px solid rgba(255,194,119,0.55); }
.card.unstable  { border-top: 2px solid rgba(244,112,124,0.55); }
.card.committee { border-top: 2px solid rgba(167,139,250,0.55); }
.card.interim   { border-top: 2px solid rgba(245,185,80,0.55); }

/* ── Player-page links (RP Leaderboard / Past Month Board) ── */
.pl-name-link { cursor: pointer; }
.pl-name-link:hover { color: var(--cyan); text-decoration: underline; text-underline-offset: 3px; }

/* ── IL badge (from the Injured List sheet) ────────────── */
.il-badge {
  display: inline-block; margin-left: 8px; vertical-align: middle;
  font: 700 9px/1 'DM Sans', sans-serif; letter-spacing: 0.06em;
  color: var(--red); background: rgba(244,112,124,0.12);
  border: 1px solid rgba(244,112,124,0.45); border-radius: 5px; padding: 2px 5px;
}
td .delta-il { color: var(--red); font-weight: 600; }
td .delta-sp { color: var(--amber); font-weight: 600; }

/* ── Clickable trend rows ──────────────────────────────── */
tr.clickable { cursor: pointer; }
tr.clickable:hover { background: rgba(85,232,255,0.07) !important; }

/* ── Player trend modal ────────────────────────────────── */
.modal-back {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(7,9,18,0.72); backdrop-filter: blur(3px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 48px 16px; overflow-y: auto;
}
.modal {
  background: var(--surface-2); border: 1px solid var(--border-table);
  border-radius: 14px; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  width: 100%; max-width: 860px; padding: 22px 24px 24px; position: relative;
}
.modal-close {
  position: absolute; top: 14px; right: 16px; cursor: pointer;
  font: 600 15px 'Work Sans', sans-serif; color: var(--text-zero);
  background: var(--surface-3); border: 1px solid var(--border-tab);
  border-radius: 8px; padding: 5px 11px; user-select: none;
}
.modal-close:hover { color: #eef2fb; border-color: rgba(255,194,119,0.4); }
.modal-title { font: 700 24px 'DM Sans', sans-serif; color: var(--text-player); }
.modal-sub   { font: 500 14px 'Work Sans', sans-serif; color: var(--text-team); margin: 4px 0 16px; }
.chart-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 640px) { .chart-grid { grid-template-columns: 1fr; } }
.chart-card {
  background: var(--surface-3); border: 1px solid var(--border-table);
  border-radius: 10px; padding: 12px 14px 10px;
}
.chart-card h4 { font: 600 13px 'Work Sans', sans-serif; color: var(--cyan-header); margin-bottom: 6px; }
.chart-card svg { width: 100%; height: auto; display: block; }
.chart-note { font: 400 11px 'Work Sans', sans-serif; color: var(--text-zero); margin-top: 6px; }

/* ── Reliever Transactions ─────────────────────────────── */
.tx-wrap { width: 100%; }
.tx-head { font: 700 22px 'DM Sans', sans-serif; color: var(--text-player); margin-bottom: 4px; }
.tx-src  { font: 400 13px 'Work Sans', sans-serif; color: var(--text-zero); margin-bottom: 16px; }
.tx-src a { color: var(--cyan); text-decoration: none; }
.tx-list { border: 1px solid var(--border-table); border-radius: 10px; overflow: hidden; }
.tx-item {
  padding: 12px 16px; font: 400 15.5px/1.5 'Work Sans', sans-serif; color: var(--text-cell);
  border-bottom: 1px solid var(--border-row);
}
.tx-item strong { font-weight: 700; color: var(--text-player); }
.tx-item:nth-child(odd)  { background: var(--row-a); }
.tx-item:nth-child(even) { background: var(--row-b); }
.tx-item:last-child { border-bottom: none; }

/* ── Injured List tab ──────────────────────────────────── */
td.wrap { white-space: normal; line-height: 1.5; }

/* ── States ────────────────────────────────────────────── */
.spinner {
  width: 26px; height: 26px; border-radius: 50%;
  border: 3px solid var(--border-tab); border-top-color: var(--cyan);
  animation: spin 0.8s linear infinite; margin: 70px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-msg { color: var(--text-zero); text-align: center; padding: 70px 20px; font: 400 14px 'Work Sans', sans-serif; }

@media (max-width: 720px) {
  .league-header { padding: 18px 16px 0; }
  .content { padding: 16px 12px 28px; }
  .league-title { font-size: 28px; line-height: 28px; }
  .tab { font-size: 15px; margin-right: 22px; padding: 10px 0 12px; }
}
</style>
</head>
<body>
<div class="league-header">
  <div class="league-title">Pitcher List's Reliever Dashboard</div>
  <div class="league-meta" id="meta">Loading&hellip;</div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="content" id="content"><div class="spinner"></div></div>

<script>
/* ════════════════════════════════════════════════════════
   PL Reliever Board — pulls live data from the Google Sheet
   on every page load via the public gviz CSV endpoint.
   ════════════════════════════════════════════════════════ */
const SHEET_ID    = '1eCGn5vyJ5N3P-FemNUUB2yi_lDKNtB62_QTWTUXEiTA';
const IL_SHEET_ID = '1cw3DE06uDcpVzADQn1eAg3wWuxhati_RPuh6rf0v4-Q';
const STREAMER_CAT_URL = 'https://pitcherlist.com/category/fantasy/relief-pitchers/reliever-streamers/';
const STREAMER_API     = 'https://pitcherlist.com/wp-json/wp/v2/posts?categories=1369&per_page=10&_fields=title,link,date,content';

const TABS = [
  { label: 'Leaderboard',           sheet: 'RP Leaderboard',       type: 'statboard', plPages: true },
  { label: 'Past Month Board',      sheet: 'Past Month Board',     type: 'statboard', plPages: true },
  { label: 'SV+HLD Trends',         sheet: 'SV+HLD Trends',        type: 'statboard', plPages: true },
  { label: 'Combined Rank',         sheet: 'Combined Ranks',       type: 'statboard', plPages: true },
  { label: 'Bullpen Depth Charts',  sheet: 'Bullpen Depth Charts', type: 'depth'     },
  { label: 'Closer Ranks',          sheet: 'Closer Rank Trends',   type: 'ranktrends',
    ranksSheet: 'Save Only Ranks',  statHeader: 'SV',         statLabel: 'SV',
    finalHeader: 'Final Y! Rank',   graph: 'closer' },
  { label: 'SV+HLD Ranks',          sheet: 'SV+HLD Rank Trends',   type: 'ranktrends',
    ranksSheet: 'SV+HLD Ranks',     statHeader: 'Save+Holds', statLabel: 'SV+HLD',
    finalHeader: 'Final Fantrax Rk.', graph: 'svhld' },
  { label: 'Transactions',          sheet: null, type: 'transactions' },
  { label: 'Injured List',          sheet: null, type: 'il' },
];

/* Publish dates for each ranking period (footer + graph x-axis). */
const RANK_DATES = {
  closer: { fall: '10/17/25', winter: '2/10/26', spring: '3/26/26', summer: '6/30/26', final: '9/28/26' },
  svhld:  { fall: null,       winter: '2/9/26',  spring: '3/26/26', summer: '6/30/26', final: null      },
};

const cache = {};          // sheet name -> parsed rows
let active = 0;
let sortState = {};        // tabIndex -> {col, dir}
let hideTrueSP = false;    // statboard toggle: hide pitchers flagged as true SPs

const $meta = document.getElementById('meta');
const $tabs = document.getElementById('tabs');
const $content = document.getElementById('content');

/* ── Data loading ──────────────────────────────────────────
   Uses the gviz JSONP endpoint (script tag, responseHandler)
   instead of fetch() so the board works from ANY origin —
   including file:// when the .html is opened directly. The
   sheet's first row comes back as column labels (headers=1)
   and is re-prepended so every renderer sees row 0 = header.
   ─────────────────────────────────────────────────────────── */
let jsonpSeq = 0;
function loadSheet(sheet, docId) {
  const key = (docId || SHEET_ID) + '::' + (sheet || '');
  if (cache[key]) return Promise.resolve(cache[key]);
  return new Promise((resolve, reject) => {
    const cb = '__plBoardCb' + (jsonpSeq++);
    let done = false;
    const cleanup = () => { done = true; delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); clearTimeout(timer); };
    window[cb] = resp => {
      if (done) return;
      try {
        if (!resp || !resp.table) throw new Error('bad response');
        const labels = (resp.table.cols || []).map(c => (c.label || ''));
        const data = (resp.table.rows || []).map(r =>
          (r.c || []).map(c => c == null ? '' : (c.f != null ? String(c.f) : (c.v != null ? String(c.v) : '')))
        );
        const all = [labels].concat(data);
        // trim trailing empty cells per row, drop fully empty rows
        const rows = all.map(r => {
          let end = r.length;
          while (end > 0 && String(r[end-1]).trim() === '') end--;
          return r.slice(0, end);
        }).filter(r => r.length > 0);
        cleanup();
        cache[key] = rows;
        resolve(rows);
      } catch (e) { cleanup(); reject(e); }
    };
    const s = document.createElement('script');
    s.src = 'https://docs.google.com/spreadsheets/d/' + (docId || SHEET_ID) +
            '/gviz/tq?tqx=out:json;responseHandler:' + cb +
            (sheet ? '&headers=1&sheet=' + encodeURIComponent(sheet) : '&headers=1') +
            '&_=' + Date.now();
    s.onerror = () => { if (!done) { cleanup(); reject(new Error('load failed')); } };
    const timer = setTimeout(() => { if (!done) { cleanup(); reject(new Error('timeout')); } }, 20000);
    document.head.appendChild(s);
  });
}

/* The Injured List sheet (separate spreadsheet, first tab). Returns
   { set: Set<normalized name>, rows: [[pitcher, notes, estReturn]], stamp } */
async function loadInjuredList() {
  const rows = await loadSheet(null, IL_SHEET_ID);
  const set = new Set();
  const data = [];
  let stamp = '';
  rows.forEach((r, i) => {
    const joined = r.join(' ');
    const m = joined.match(/Last updated[^|]*/i);
    if (m) { stamp = m[0].trim(); if (i === 0) return; }
    if (i === 0) return;                       // header row
    const nm = (r[0] || '').trim();
    if (!nm || /^Last updated/i.test(nm)) return;
    set.add(normName(nm));
    data.push([nm, (r[1] || '').trim(), (r[2] || '').trim()]);
  });
  return { set, rows: data, stamp };
}

/* ── Helpers ───────────────────────────────────────────── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function numVal(s) {
  if (s == null) return NaN;
  const m = String(s).replace(/[%,]/g, '').trim();
  if (m === '' || m === '—') return NaN;
  return parseFloat(m);
}
function cellHtml(raw) {
  const v = String(raw == null ? '' : raw).trim();
  if (v === '') return '<span class="zero">—</span>';
  const n = numVal(v);
  if (!isNaN(n) && n === 0) return '<span class="zero">' + esc(v) + '</span>';
  return esc(v);
}
function playerCell(name, team, flagged, onIL, plLink) {
  const badge = flagged ? '<span class="sp-badge" title="Flagged as a true starter / bulk usage">SP</span>' : '';
  const il = onIL ? '<span class="il-badge" title="Currently on the injured list">IL</span>' : '';
  const linkCls  = plLink ? ' pl-name-link' : '';
  const linkAttr = plLink ? ' data-plname="' + esc(name) + '" title="Open Pitcher List player page"' : '';
  return '<td class="player-cell"><div class="player-name' + linkCls + '"' + linkAttr + '>' + esc(name) + badge + il +
         '</div><div class="player-team">' + esc(team || '') + '</div></td>';
}
/* Accent/punctuation-insensitive name key: "Andrés Muñoz" → "andres munoz" */
function normName(s) {
  return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '')
    .toLowerCase().replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ').trim();
}
function setMeta(note) {
  $meta.textContent = note ? note.replace(/\s*\|\s*/g, ' · ') : '';
}
function isNoteRow(r) {
  const c = (r[0] || '').trim();
  return /^Last updated/i.test(c) || /^pCRA \(/i.test(c) || /^CL = Closer/i.test(c) || /^Orange row/i.test(c);
}

/* ── Renderers ─────────────────────────────────────────── */
function renderStatboard(rows, tabIdx) {
  const header = rows[0];
  const notes = rows.filter(isNoteRow).map(r => r[0]);
  let data = rows.slice(1).filter(r => !isNoteRow(r) && (r[0] || '').trim() !== '');

  // Detect the machine-readable SP flag column (added by the Apps Script).
  // It is NOT rendered as a stat column — it drives the badge, row highlight,
  // and the show/hide toggle. If the column isn't present (older sheet), spCol
  // is -1 and everything below degrades to the original behavior.
  const spCol = header.findIndex(hh => String(hh).trim().toUpperCase() === 'SP');
  const isFlagged = r => spCol >= 0 && String(r[spCol] == null ? '' : r[spCol]).trim() !== '';

  const cols = [];           // displayed columns: [2..end of header], minus SP
  for (let i = 2; i < header.length; i++) if (i !== spCol) cols.push(i);

  const st = sortState[tabIdx];
  if (st) {
    data = data.slice().sort((a, b) => {
      if (st.col === 'player') {
        return st.dir * String(a[0]).localeCompare(String(b[0]));
      }
      const av = numVal(a[st.col]), bv = numVal(b[st.col]);
      if (isNaN(av) && isNaN(bv)) return 0;
      if (isNaN(av)) return 1;
      if (isNaN(bv)) return -1;
      return st.dir * (av - bv);
    });
  }

  // Count flagged pitchers (pre-filter) for the toggle label, then optionally
  // hide them from the table. "Visual flag + filter toggle" — default shows them.
  const flaggedTotal = spCol >= 0 ? data.filter(isFlagged).length : 0;
  if (hideTrueSP && spCol >= 0) data = data.filter(r => !isFlagged(r));

  let h = '';
  if (spCol >= 0 && flaggedTotal > 0) {
    h += '<div class="board-controls"><label class="sp-toggle">' +
         '<input type="checkbox" id="spToggle"' + (hideTrueSP ? ' checked' : '') + '>' +
         '<span>Hide true SPs (' + flaggedTotal + ')</span></label></div>';
  }
  h += '<div class="table-wrap"><div class="table-scroll"><table><thead><tr>';
  h += sortableTh('Player', 'player', tabIdx, false);
  for (const i of cols) h += sortableTh(header[i], i, tabIdx, true);
  h += '</tr></thead><tbody>';
  const plLink = !!(TABS[tabIdx] && TABS[tabIdx].plPages);
  for (const r of data) {
    const fl = isFlagged(r);
    h += '<tr class="data-row' + (fl ? ' sp-flagged' : '') + '">' + playerCell(r[0], r[1], fl, false, plLink);
    for (const i of cols) h += '<td class="num">' + cellHtml(r[i]) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';
  h += footNotes(notes.filter(n => !/^Last updated/i.test(n)));
  let metaNote = notes.find(n => /^Last updated/i.test(n)) || '';
  const sheetName = TABS[tabIdx] && TABS[tabIdx].sheet;

  /* Past Month Board: 50-pitch PLV minimum + friendlier rolling-window label. */
  if (sheetName === 'Past Month Board') {
    metaNote = metaNote.replace(/min 100 pitches/i, 'min 50 pitches');
    metaNote = metaNote.replace(/Window:[^|]*/i, 'Window: Past 30 Days  ');
  }

  /* SV+HLD Trends and Combined Ranks: split the meta legend onto a second
     line for readability (and Combined Ranks drops its sort-order note). */
  if (sheetName === 'SV+HLD Trends' || sheetName === 'Combined Ranks') {
    if (sheetName === 'Combined Ranks') {
      metaNote = metaNote.replace(/your manual ranking/i, 'my manual ranking');
    }
    let parts = metaNote.split(/\s*\|\s*/).map(s => s.trim()).filter(Boolean);
    if (sheetName === 'Combined Ranks') {
      parts = parts.filter(p => !/^Sorted by Combined Rank/i.test(p));
      const svIdx = parts.findIndex(p => /^SV\+HLD Rank/i.test(p));
      if (svIdx !== -1) parts.splice(svIdx + 1, 0,
        'Save Only Rank ← “Save Only Ranks” (also my manual ranking, not included in Combined Rank)',
        'SV+HLD’s = total Saves + Holds this season');
    }
    const breakRe = sheetName === 'Combined Ranks' ? /^SV\+HLD Rank/i : /^Usage\s*=/i;
    const idx = parts.findIndex(p => breakRe.test(p));
    if (idx > 0) {
      $meta.innerHTML = esc(parts.slice(0, idx).join(' · ')) + '<br>' +
                        esc(parts.slice(idx).join(' · '));
    } else {
      setMeta(metaNote);
    }
  } else {
    setMeta(metaNote);
  }
  return h;
}

function sortableTh(label, col, tabIdx, numeric) {
  const st = sortState[tabIdx];
  const arr = st && String(st.col) === String(col) ? (st.dir === 1 ? ' <span class="arr">▴</span>' : ' <span class="arr">▾</span>') : '';
  return '<th class="sortable' + (numeric ? ' num' : '') + '" data-col="' + col + '">' + esc(label) + arr + '</th>';
}

/* ── Rank Trends (current ranking merged with seasonal trend tab) ──
   Column layout of both trend tabs on the sheet (fixed positions):
   0 Pitcher · 1 Team · 2 Fall · 3 Winter · 4 Spring · 5 Summer ·
   6 Final · 7-11 Δ columns · 12 IP · 13 SV (or Save+Holds) ·
   14 ERA · 15 WHIP · 16 K · 17 Days Missed                        */
const rankTrendsData = {};   // tabIdx -> { recs, tab } for the player modal

function buildRankTrends(tab, trendRows, rankRows, ilSet) {
  const cur = {};                                   // normalized name -> current rank
  rankRows.slice(1).forEach(r => {
    const nm = (r[1] || '').trim();
    const rk = numVal(r[0]);
    if (nm && !isNaN(rk)) cur[normName(nm)] = rk;
  });
  const stamp = ((rankRows[0] || [])[5] || '').trim();   // "Last updated: …" lives in F1

  const recs = [];
  trendRows.slice(1).forEach(r => {
    const nm = (r[0] || '').trim();
    if (!nm || isNoteRow(r)) return;
    const v = i => (r[i] == null ? '' : String(r[i]).trim());
    const key  = normName(nm);
    const onIL = ilSet.has(key);
    const dm   = v(17);
    const inRot = /rotation/i.test(dm);
    // Blank Δ where the earlier rank exists but the later one doesn't gets
    // an explanation when we have one: SP (moved to rotation) or IL.
    const delta = (raw, earlier, later) => {
      if (raw !== '') return raw;
      if (earlier !== '' && later === '') { if (inRot) return 'SP'; if (onIL) return 'IL'; }
      return '';
    };
    recs.push({
      name: nm, team: v(1), key, onIL,
      cur:  cur.hasOwnProperty(key) ? String(cur[key]) : '',
      fall: v(2), win: v(3), spr: v(4), sum: v(5), fin: v(6),
      dfw: delta(v(7),  v(2), v(3)),
      dws: delta(v(8),  v(3), v(4)),
      dss: delta(v(9),  v(4), v(5)),
      dsf: delta(v(10), v(5), v(6)),
      dff: delta(v(11), v(2), v(6)),
      ip: v(12), sv: v(13), era: v(14), whip: v(15), k: v(16), dm: dm,
    });
  });

  // Default order: current rank asc; unranked pitchers after, by their
  // most recent seasonal rank.
  const altRank = x => {
    for (const f of ['sum', 'spr', 'win', 'fall']) { const n = numVal(x[f]); if (!isNaN(n)) return n; }
    return Infinity;
  };
  recs.sort((a, b) => {
    const ar = a.cur === '' ? Infinity : +a.cur, br = b.cur === '' ? Infinity : +b.cur;
    if (ar !== br) return ar - br;
    return altRank(a) - altRank(b);
  });
  return { recs, stamp };
}

function renderRankTrends(tab, tabIdx, built) {
  const D = RANK_DATES[tab.graph];
  // No Fall ranking yet for this list (D.fall is null) → hide the Fall Rank
  // column and its two Δ columns until next season's Fall list exists.
  const hasFall = !!D.fall;
  const COLS = [
    ['Current Rank', 'cur'],
  ].concat(hasFall ? [['Fall Rank', 'fall']] : []).concat([
    ['Winter Rank', 'win'], ['Spring Rank', 'spr'], ['Summer Rank', 'sum'], [tab.finalHeader, 'fin'],
  ]).concat(hasFall ? [['Fall→Winter Δ', 'dfw']] : []).concat([
    ['Winter→Spring Δ', 'dws'], ['Spring→Summer Δ', 'dss'], ['Summer→Final Δ', 'dsf'],
  ]).concat(hasFall ? [['Fall→Final Δ', 'dff']] : []).concat([
    ['IP', 'ip'], [tab.statLabel, 'sv'], ['ERA', 'era'], ['WHIP', 'whip'],
    ['K', 'k'], ['Days Missed', 'dm'],
  ]);
  const deltaFields = new Set(['dfw', 'dws', 'dss', 'dsf', 'dff']);

  let recs = built.recs;
  const st = sortState[tabIdx];
  if (st) {
    recs = recs.slice().sort((a, b) => {
      if (st.col === 'player') return st.dir * a.name.localeCompare(b.name);
      const av = numVal(a[st.col]), bv = numVal(b[st.col]);
      if (isNaN(av) && isNaN(bv)) return 0;
      if (isNaN(av)) return 1;
      if (isNaN(bv)) return -1;
      return st.dir * (av - bv);
    });
  }

  let h = '<div class="table-wrap"><div class="table-scroll"><table><thead><tr>';
  h += sortableTh('Player', 'player', tabIdx, false);
  for (const [label, field] of COLS) h += sortableTh(label, field, tabIdx, true);
  h += '</tr></thead><tbody>';
  for (const r of recs) {
    h += '<tr class="data-row clickable" data-key="' + esc(r.key) + '" title="Click for trend graphs">' +
         playerCell(r.name, r.team, false, r.onIL);
    for (const [, field] of COLS) {
      const v = r[field];
      if (deltaFields.has(field) && v !== '') {
        if (v === 'IL') h += '<td class="num"><span class="delta-il">IL</span></td>';
        else if (v === 'SP') h += '<td class="num"><span class="delta-sp">SP</span></td>';
        else {
          const n = numVal(v);
          let cls = '', glyph = '';
          if (!isNaN(n) && n > 0) { cls = 'up'; glyph = '▲ '; }
          else if (!isNaN(n) && n < 0) { cls = 'down'; glyph = '▼ '; }
          h += '<td class="num"><span class="' + cls + '">' + glyph +
               esc(!isNaN(n) && n < 0 ? String(Math.abs(n)) : v) + '</span></td>';
        }
      } else {
        h += '<td class="num">' + cellHtml(v) + '</td>';
      }
    }
    h += '</tr>';
  }
  h += '</tbody></table></div></div>';

  const dateBits = [];
  if (D.fall)  dateBits.push('Fall Rank = ' + D.fall);
  else         dateBits.push('Fall Rank starts next season');
  dateBits.push('Winter Rank = ' + D.winter, 'Spring Rank = ' + D.spring, 'Summer Rank = ' + D.summer);
  dateBits.push(tab.finalHeader + ' = ' + (D.final || 'end of season'));

  h += footNotes([
    'Current Rank ← “' + tab.ranksSheet + '” (my manual ranking, updated weekly)',
    'Rank publish dates: ' + dateBits.join('  |  '),
    'Δ columns: ▲ = rose in the ranks, ▼ = fell  |  IL = dropped out while on the injured list  |  SP = moved to the rotation  |  blank = not ranked that period',
    'IL badge = currently on the injured list  |  Click any player for rank, ERA, WHIP and K% trend graphs',
    'If you’re looking for the detailed list or ranking of Relievers, check out my weekly RP Ranks: https://pitcherlist.com/category/fantasy/relief-pitchers/reliever-ranks/',
  ]);
  setMeta(built.stamp || '');
  return h;
}

/* ── Player trend modal + charts ───────────────────────── */
const playerStatCache = {};

function parseMDY(s) {
  const p = String(s).split('/').map(Number);
  return new Date(p[2] < 100 ? 2000 + p[2] : p[2], p[0] - 1, p[1]).getTime();
}

function lineChart(pts, opts) {
  opts = opts || {};
  if (!pts || pts.length < 2) return '<div class="chart-note">Not enough data yet.</div>';
  const W = 380, H = 150, padL = 38, padR = 14, padT = 12, padB = 24;
  const xs = pts.map(p => p.t), ys = pts.map(p => p.y);
  let y0 = Math.min.apply(null, ys), y1 = Math.max.apply(null, ys);
  if (y0 === y1) { y0 -= 1; y1 += 1; }
  const pad = (y1 - y0) * 0.1; y0 -= pad; y1 += pad;
  if (opts.floorZero && y0 < 0) y0 = 0;
  if (opts.zeroBase) y0 = 0;          // fixed baseline (0.00 for ERA/WHIP, 0% for K%)
  const x0 = Math.min.apply(null, xs), x1 = Math.max.apply(null, xs);
  const X = t => padL + (W - padL - padR) * (x1 === x0 ? 0.5 : (t - x0) / (x1 - x0));
  const Y = v => opts.invert
    ? padT + (H - padT - padB) * ((v - y0) / (y1 - y0))
    : H - padB - (H - padT - padB) * ((v - y0) / (y1 - y0));
  const fmt  = opts.fmt || (v => String(Math.round(v * 100) / 100));
  const dFmt = t => { const d = new Date(t); return (d.getMonth() + 1) + '/' + d.getDate(); };
  const axis = 'fill="rgba(164,170,202,0.8)" font-size="10" font-family="Work Sans, sans-serif"';

  let h = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
  const topVal = opts.invert ? y0 : y1, botVal = opts.invert ? y1 : y0;
  h += '<line x1="' + padL + '" y1="' + padT + '" x2="' + (W - padR) + '" y2="' + padT + '" stroke="rgba(140,165,210,0.18)"/>' +
       '<line x1="' + padL + '" y1="' + (H - padB) + '" x2="' + (W - padR) + '" y2="' + (H - padB) + '" stroke="rgba(140,165,210,0.18)"/>' +
       '<text x="4" y="' + (padT + 4) + '" ' + axis + '>' + esc(fmt(topVal)) + '</text>' +
       '<text x="4" y="' + (H - padB + 4) + '" ' + axis + '>' + esc(fmt(botVal)) + '</text>';
  h += '<polyline fill="none" stroke="#55e8ff" stroke-width="2" stroke-linejoin="round" points="' +
       pts.map(p => X(p.t).toFixed(1) + ',' + Y(p.y).toFixed(1)).join(' ') + '"/>';
  pts.forEach((p, idx) => {
    const cx = X(p.t).toFixed(1), cy = Y(p.y).toFixed(1);
    if (opts.showPoints) {
      h += '<circle cx="' + cx + '" cy="' + cy + '" r="3.5" fill="#ffc277"/>' +
           '<text x="' + cx + '" y="' + (Y(p.y) - 8).toFixed(1) + '" text-anchor="middle" fill="#ffc277" font-size="11" font-weight="600" font-family="Work Sans, sans-serif">' + esc(fmt(p.y)) + '</text>';
      if (p.lbl) h += '<text x="' + cx + '" y="' + (H - padB + 14) + '" text-anchor="middle" ' + axis + '>' + esc(p.lbl) + '</text>';
    } else if (idx === 0 || idx === pts.length - 1) {
      h += '<text x="' + cx + '" y="' + (H - padB + 14) + '" text-anchor="' + (idx === 0 ? 'start' : 'end') + '" ' + axis + '>' + dFmt(p.t) + '</text>';
    }
  });
  h += '</svg>';
  return h;
}

function ipOuts(ip) {
  const p = String(ip || '0').split('.');
  return (+p[0] || 0) * 3 + (+(p[1] || 0));
}

async function loadPlayerStats(rec) {
  if (playerStatCache[rec.key]) return playerStatCache[rec.key];
  const sr = await fetch('https://statsapi.mlb.com/api/v1/people/search?names=' +
    encodeURIComponent(rec.name) + '&sportIds=1').then(r => r.json());
  const people = sr.people || [];
  const p = people.find(x => x.primaryPosition &&
        /pitcher/i.test(String(x.primaryPosition.type || '') + String(x.primaryPosition.name || ''))) || people[0];
  if (!p) throw new Error('player not found');
  const gl = await fetch('https://statsapi.mlb.com/api/v1/people/' + p.id +
    '/stats?stats=gameLog&season=2026&group=pitching').then(r => r.json());
  const splits = ((gl.stats || [])[0] || {}).splits || [];
  splits.sort((a, b) => (a.date < b.date ? -1 : 1));
  let outs = 0, er = 0, hits = 0, bb = 0, so = 0, tbf = 0;
  const era = [], whip = [], kpct = [];
  splits.forEach(s => {
    const st = s.stat || {};
    outs += ipOuts(st.inningsPitched);
    er += +st.earnedRuns || 0; hits += +st.hits || 0;
    bb += +st.baseOnBalls || 0; so += +st.strikeOuts || 0; tbf += +st.battersFaced || 0;
    const t = new Date(s.date + 'T12:00:00').getTime();
    const ip = outs / 3;
    if (ip > 0) { era.push({ t, y: 9 * er / ip }); whip.push({ t, y: (hits + bb) / ip }); }
    if (tbf > 0) kpct.push({ t, y: 100 * so / tbf });
  });
  const out = { era, whip, kpct, games: splits.length };
  playerStatCache[rec.key] = out;
  return out;
}

function openPlayerModal(tabIdx, key) {
  const store = rankTrendsData[tabIdx];
  if (!store) return;
  const rec = store.recs.find(r => r.key === key);
  if (!rec) return;
  const D = RANK_DATES[store.tab.graph];

  const rankPts = [];
  const addPt = (lbl, dateStr, val) => {
    const n = numVal(val);
    if (!isNaN(n) && dateStr) rankPts.push({ lbl, t: parseMDY(dateStr), y: n });
  };
  addPt('Fall', D.fall, rec.fall);
  addPt('Winter', D.winter, rec.win);
  addPt('Spring', D.spring, rec.spr);
  addPt('Summer', D.summer, rec.sum);
  if (D.final) addPt('Final', D.final, rec.fin);
  const curN = numVal(rec.cur);
  if (!isNaN(curN)) rankPts.push({ lbl: 'Now', t: Date.now(), y: curN });
  rankPts.sort((a, b) => a.t - b.t);

  const chartCard = (title, body, note) =>
    '<div class="chart-card"><h4>' + esc(title) + '</h4>' + body +
    (note ? '<div class="chart-note">' + esc(note) + '</div>' : '') + '</div>';

  const rankSvg = lineChart(rankPts, {
    invert: true, showPoints: true, fmt: v => String(Math.round(v)),
  });

  let h = '<div class="modal-back" id="playerModal"><div class="modal">' +
    '<span class="modal-close" id="modalClose">✕ Close</span>' +
    '<div class="modal-title">' + esc(rec.name) +
    (rec.onIL ? '<span class="il-badge" style="vertical-align:middle">IL</span>' : '') + '</div>' +
    '<div class="modal-sub">' + esc(rec.team || '') +
    (rec.dm !== '' && rec.dm !== '0' ? '  ·  Days missed: ' + esc(rec.dm) : '') + '</div>' +
    '<div class="chart-grid">' +
    chartCard('Rank over time (lower = better)', rankSvg) +
    '<div class="chart-card" id="chERA"><h4>ERA — season progression</h4><div class="spinner" style="margin:36px auto"></div></div>' +
    '<div class="chart-card" id="chWHIP"><h4>WHIP — season progression</h4><div class="spinner" style="margin:36px auto"></div></div>' +
    '<div class="chart-card" id="chK"><h4>K% — season progression</h4><div class="spinner" style="margin:36px auto"></div></div>' +
    '</div></div></div>';

  document.body.insertAdjacentHTML('beforeend', h);

  loadPlayerStats(rec).then(sr => {
    const put = (id, title, pts, opts) => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<h4>' + esc(title) + '</h4>' + lineChart(pts, opts) +
        '<div class="chart-note">Cumulative through each appearance · MLB game logs</div>';
    };
    put('chERA',  'ERA — season progression',  sr.era,  { fmt: v => v.toFixed(2), zeroBase: true });
    put('chWHIP', 'WHIP — season progression', sr.whip, { fmt: v => v.toFixed(2), zeroBase: true });
    put('chK',    'K% — season progression',   sr.kpct, { fmt: v => Math.round(v) + '%', zeroBase: true });
  }).catch(() => {
    ['chERA', 'chWHIP', 'chK'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = el.querySelector('h4').outerHTML +
        '<div class="chart-note">Season graphs unavailable right now.</div>';
    });
  });
}

/* ── Pitcher List player-page links ────────────────────── */
const plPageCache = {};

async function resolvePlayerPage(name) {
  const key = normName(name);
  if (plPageCache[key]) return plPageCache[key];
  const res = await fetch('https://pitcherlist.com/wp-json/wp/v2/search?search=' +
    encodeURIComponent(name) + '&subtype=player&per_page=5&_fields=url,title')
    .then(r => r.json()).catch(() => []);
  const players = Array.isArray(res) ? res : [];
  // Prefer an exact (accent-insensitive) title match. When two players share
  // a name (e.g. edwin-diaz vs edwin-diaz-2), the RELIEVER owns the base slug
  // without the numeric suffix — prefer it. Fall back to the site search page
  // so the click always lands somewhere.
  const exact = players.filter(x => normName(decodeEntities(x.title)) === key);
  const pool = (exact.length ? exact : players).slice();
  const noSuffix = u => !/-\d+\/?$/.test(String(u).replace(/\/$/, ''));
  pool.sort((a, b) => (noSuffix(b.url) ? 1 : 0) - (noSuffix(a.url) ? 1 : 0));
  const pick = pool[0];
  const url = pick ? pick.url : 'https://pitcherlist.com/?s=' + encodeURIComponent(name);
  plPageCache[key] = url;
  return url;
}

function openPlayerPage(name) {
  const w = window.open('', '_blank');          // open synchronously (popup-blocker safe)
  resolvePlayerPage(name).then(url => {
    if (w) w.location = url; else window.open(url, '_blank');
  }).catch(() => { if (w) w.close(); });
}

/* ── Reliever Transactions (latest Reliever Streamers article) ── */
let txCache = null;

function decodeEntities(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || '';
}

async function loadTransactions() {
  if (txCache) return txCache;
  const posts = await fetch(STREAMER_API).then(r => r.json());
  if (!posts || !posts.length) throw new Error('no posts');
  // One section per daily article (newest first) — roughly the past 1–2 weeks.
  const sections = [];
  posts.forEach(p => {
    const div = document.createElement('div');
    div.innerHTML = p.content.rendered;
    // The "Transactions (…)" header is sometimes a real heading, sometimes a
    // styled <p>/<strong>. Match any short element whose text starts with
    // "Transactions" and that doesn't itself contain the list.
    let heading = null;
    div.querySelectorAll('h1,h2,h3,h4,h5,h6,p,strong,b,div').forEach(el => {
      const t = (el.textContent || '').trim();
      if (!heading && /^Transactions\b/i.test(t) && t.length < 80 && !el.querySelector('li')) heading = el;
    });
    if (!heading) return;
    // Render each transaction with the PLAYER name in bold. In the articles
    // player names are links to /player/ pages; if none are marked that way,
    // fall back to bolding every link after the first (the first is the team).
    const liHtml = li => {
      const anchors = Array.prototype.slice.call(li.querySelectorAll('a'));
      const playerAs = anchors.filter(a => /\/player\//.test(a.getAttribute('href') || ''));
      const boldSet = new Set(playerAs.length ? playerAs : anchors.slice(1));
      let out = '';
      (function walk(node) {
        node.childNodes.forEach(n => {
          if (n.nodeType === 3) out += esc(n.textContent);
          else if (n.nodeType === 1) {
            if (n.tagName === 'A') {
              const t = esc(n.textContent);
              if (boldSet.has(n)) {
                // Bold + clickable → Pitcher List player page. Use the article's
                // own /player/ link when present; otherwise resolve by name.
                const href = n.getAttribute('href') || '';
                const direct = /\/player\//.test(href) ? ' data-plurl="' + esc(href) + '"' : '';
                out += '<strong class="pl-name-link" data-plname="' + esc(n.textContent.trim()) + '"' +
                       direct + ' title="Open Pitcher List player page">' + t + '</strong>';
              } else {
                out += t;
              }
            } else walk(n);
          }
        });
      })(li);
      return out.trim();
    };
    const items = [];   // pre-escaped HTML strings
    let node = heading.nextElementSibling ||
      (heading.parentElement && heading.parentElement !== div ? heading.parentElement.nextElementSibling : null);
    while (node) {
      if (/^H[1-6]$/.test(node.tagName)) break;
      const lis = node.querySelectorAll('li');
      if (lis.length) {
        lis.forEach(li => items.push(liHtml(li)));
      } else if (items.length && (node.textContent || '').trim() !== '') {
        break;   // list done — next section is starting
      }
      node = node.nextElementSibling;
    }
    if (items.length) {
      sections.push({
        headText: heading.textContent.trim(),
        title: decodeEntities(p.title.rendered),
        link: p.link,
        items: items,
      });
    }
  });
  txCache = { sections };
  return txCache;
}

function renderTransactions(tx) {
  setMeta('Pulled from the Reliever Streamers series');
  let h = '<div class="tx-wrap">';
  if (tx.sections.length) {
    tx.sections.forEach(s => {
      h += '<div class="tx-head">' + esc(s.headText) + '</div>' +
        '<div class="tx-src">From <a href="' + esc(s.link) + '" target="_blank" rel="noopener">' +
        esc(s.title) + '</a></div>' +
        '<div class="tx-list" style="margin-bottom:26px">' +
        s.items.map(i => '<div class="tx-item">' + i + '</div>').join('') + '</div>';
    });
  } else {
    h += '<div class="state-msg">No transactions found in the recent articles.</div>';
  }
  h += footNotes(['If you’re looking for updated Bullpen Usage Charts for today: ' + STREAMER_CAT_URL]) +
    '</div>';
  return h;
}

/* ── Injured List tab ──────────────────────────────────── */
function renderILTab(il) {
  setMeta(il.stamp || ('Data as of ' + new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })));
  let h = '<div class="table-wrap"><div class="table-scroll"><table><thead><tr>' +
    '<th style="width:210px">Player</th><th>Notes</th><th style="width:220px">Est. Return</th>' +
    '</tr></thead><tbody>';
  for (const r of il.rows) {
    h += '<tr><td class="player-cell"><div class="player-name pl-name-link" data-plname="' + esc(r[0]) +
      '" title="Open Pitcher List player page">' + esc(r[0]) +
      '<span class="il-badge">IL</span></div></td>' +
      '<td class="wrap">' + esc(r[1]) + '</td>' +
      '<td>' + cellHtml(r[2]) + '</td></tr>';
  }
  h += '</tbody></table></div></div>';
  h += footNotes([il.rows.length + ' pitcher(s) currently listed']);
  return h;
}

function renderDepth(rows) {
  const note = rows.find(isNoteRow);
  // The depth-chart note row combines the legend and the "Last updated"
  // stamp. Break it onto two lines so the timestamp sits below the legend.
  if (note && note[0]) {
    // Split the depth-chart legend onto three lines:
    //   1) role abbreviations + handedness key
    //   2) the "Card color = …" closer-situation key
    //   3) the "Last updated …" stamp
    const parts = note[0].split('|').map(s => s.trim()).filter(Boolean);
    const lines = [[], [], []];
    parts.forEach(p => {
      if (/^Card color/i.test(p))        lines[1].push(p);
      else if (/^Last updated/i.test(p)) lines[2].push(p);
      else                               lines[0].push(p);
    });
    $meta.innerHTML = lines.filter(l => l.length)
      .map(l => esc(l.join(' · '))).join('<br>');
  } else {
    setMeta('');
  }
  const statusClass = s => {
    s = (s || '').trim().toUpperCase();
    if (s === 'STABLE') return 'stable';
    if (s === 'CAUTIOUS') return 'cautious';
    if (s === 'UNSTABLE') return 'unstable';
    if (s === 'COMMITTEE') return 'committee';
    if (s === 'INTERIM') return 'interim';
    return '';
  };
  let h = '';
  let i = 0;
  while (i < rows.length) {
    const c0 = (rows[i][0] || '').trim();
    if (/^(AL|NL) (East|Central|West)$/.test(c0)) {
      const division = c0;
      const teamRow = rows[i+1] || [];
      const statusRow = rows[i+2] || [];
      // collect role rows until next division header or note row
      let j = i + 3;
      const roleRows = [];
      while (j < rows.length && !/^(AL|NL) (East|Central|West)$/.test((rows[j][0]||'').trim()) && !isNoteRow(rows[j])) {
        roleRows.push(rows[j]); j++;
      }
      h += '<div class="section-title">' + esc(division) + '</div><div class="bp-grid">';
      for (let t = 0; t < 5; t++) {
        const base = t * 4;
        const team = (teamRow[base] || '').trim();
        if (!team) continue;
        const status = (statusRow[base] || '').trim();
        const sc = statusClass(status);
        h += '<div class="card ' + sc + '"><div class="bp-team">' + esc(team) + '</div>' +
             (status ? '<span class="chip ' + sc + '">' + esc(status.toUpperCase()) + '</span>' : '');
        for (const rr of roleRows) {
          const role = (rr[base] || '').trim();
          const name = (rr[base+1] || '').trim();
          const hand = (rr[base+2] || '').trim().toUpperCase();
          if (!name) continue;
          const rc = role === 'CL' ? 'cl' : role === 'CO' ? 'co' : role === 'SU' ? 'su' : '';
          h += '<div class="bp-row"><span class="bp-role ' + rc + '">' + esc(role) + '</span>' +
               '<span class="bp-name pl-name-link" data-plname="' + esc(name) + '" title="Open Pitcher List player page">' + esc(name) + '</span>' +
               '<span class="bp-hand' + (hand === 'L' ? ' lefty' : '') + '">' + esc(hand) + 'HP</span></div>';
        }
        h += '</div>';
      }
      h += '</div>';
      i = j;
    } else i++;
  }
  h += footNotes([
    'CL = Closer · CO = Co-Closer · SU = Setup · MR = Middle Relief · Gold handedness = LHP · Card color = closer situation (green STABLE · amber CAUTIOUS · red UNSTABLE · violet COMMITTEE · gold INTERIM)',
    'If you’re looking for potential relievers to stream each day: ' + STREAMER_CAT_URL,
  ]);
  return h;
}

function footNotes(notes) {
  const real = (notes || []).filter(Boolean);
  if (!real.length) return '';
  return '<div class="foot-note">' + real.map(n =>
    esc(n).replace(/\s*\|\s*/g, ' · ').replace(/(https?:\/\/\S+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
  ).join('<br>') + '</div>';
}

/* ── Tab switching & boot ──────────────────────────────── */
function renderTabs() {
  $tabs.innerHTML = TABS.map((t, i) =>
    '<div class="tab' + (i === active ? ' active' : '') + '" data-i="' + i + '">' + esc(t.label) + '</div>'
  ).join('');
}
$tabs.addEventListener('click', e => {
  const el = e.target.closest('.tab');
  if (!el) return;
  active = +el.dataset.i;
  renderTabs();
  show(active);
});
$content.addEventListener('change', e => {
  if (e.target && e.target.id === 'spToggle') {
    hideTrueSP = e.target.checked;
    show(active);
  }
});
$content.addEventListener('click', e => {
  const th = e.target.closest('th.sortable');
  if (th) {
    const colRaw = th.dataset.col;
    const col = colRaw === 'player' ? 'player' : (isNaN(+colRaw) ? colRaw : +colRaw);
    const st = sortState[active];
    if (st && String(st.col) === String(col)) st.dir = -st.dir;
    else sortState[active] = { col, dir: (col === 'player' || typeof col === 'string') ? 1 : -1 };
    show(active);
    return;
  }
  const nm = e.target.closest('.pl-name-link');
  if (nm) {
    if (nm.dataset.plurl) window.open(nm.dataset.plurl, '_blank');
    else openPlayerPage(nm.dataset.plname);
    return;
  }
  const tr = e.target.closest('tr.clickable');
  if (tr && TABS[active] && TABS[active].type === 'ranktrends') {
    openPlayerModal(active, tr.dataset.key);
  }
});

/* Player-modal close: ✕ button, backdrop click, or Escape. */
document.addEventListener('click', e => {
  const back = document.getElementById('playerModal');
  if (!back) return;
  if (e.target.id === 'modalClose' || e.target === back) back.remove();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const back = document.getElementById('playerModal');
    if (back) back.remove();
  }
});

/* Season Saves+Holds totals for every pitcher, from MLB's official season
   stats (playerPool=All). Cached per page load. */
const svhldTotalsCache = { map: null };
async function loadSvHldTotals() {
  if (svhldTotalsCache.map) return svhldTotalsCache.map;
  const r = await fetch('https://statsapi.mlb.com/api/v1/stats?stats=season&group=pitching&season=2026' +
    '&sportIds=1&playerPool=All&limit=3000&fields=stats,splits,player,fullName,stat,saves,holds');
  const j = await r.json();
  const map = {};
  ((((j.stats || [])[0]) || {}).splits || []).forEach(s => {
    const nm = s.player && s.player.fullName;
    if (!nm) return;
    map[normName(nm)] = ((+(s.stat && s.stat.saves) || 0) + (+(s.stat && s.stat.holds) || 0));
  });
  svhldTotalsCache.map = map;
  return map;
}

/* Combined Ranks: rebuild the display columns in this order —
   Save Only Rank · SV+HLD Rank · SV+HLD's (season Saves+Holds, MLB) ·
   Usage Rank · Past 30 Rank · Overall Rank · Combined Rank.
   Save Only Rank comes live from the "Save Only Ranks" tab. All of it is
   display-only — the sheet and its Combined Rank formula are untouched. */
function buildCombinedRows(rows, rankRows, svhldTotals) {
  const cur = {};
  (rankRows || []).slice(1).forEach(r => {
    const nm = (r[1] || '').trim();
    const rk = numVal(r[0]);
    if (nm && !isNaN(rk)) cur[normName(nm)] = String(rk);
  });
  const H = rows[0].map(h => String(h).trim());
  const ix = n => H.findIndex(h => h.toUpperCase() === n.toUpperCase());
  const iUsage = ix('Usage Rank'), iP30 = ix('Past 30 Rank'), iOv = ix('Overall Rank'),
        iSVR = ix('SV+HLD Rank'), iComb = ix('Combined Rank'), iSP = ix('SP');
  const out = [['Name', 'Team', 'Save Only Rank', 'SV+HLD Rank', 'SV+HLD’s',
                'Usage Rank', 'Past 30 Rank', 'Overall Rank', 'Combined Rank', 'SP']];
  rows.slice(1).forEach(r => {
    if (isNoteRow(r) || (r[0] || '').trim() === '') { out.push(r); return; }
    const nm = (r[0] || '').trim();
    const key = normName(nm);
    const tot = (svhldTotals && svhldTotals.hasOwnProperty(key)) ? String(svhldTotals[key]) : '';
    const g = i => (i === -1 || r[i] == null) ? '' : r[i];
    out.push([nm, g(1), cur[key] || '', g(iSVR), tot, g(iUsage), g(iP30), g(iOv), g(iComb), g(iSP)]);
  });
  return out;
}

function tabReady(tab) {
  const have = (s, id) => ((id || SHEET_ID) + '::' + (s || '')) in cache;
  if (tab.type === 'transactions') return !!txCache;
  if (tab.type === 'il')           return have(null, IL_SHEET_ID);
  if (tab.type === 'ranktrends')   return have(tab.sheet) && have(tab.ranksSheet) && have(null, IL_SHEET_ID);
  return have(tab.sheet);
}

async function show(i) {
  const tab = TABS[i];
  if (!tabReady(tab)) $content.innerHTML = '<div class="spinner"></div>';
  try {
    let html = '';
    if (tab.type === 'ranktrends') {
      const [trendRows, rankRows, il] = await Promise.all([
        loadSheet(tab.sheet),
        loadSheet(tab.ranksSheet),
        loadInjuredList().catch(() => ({ set: new Set(), rows: [], stamp: '' })),
      ]);
      if (i !== active) return;
      if (!trendRows || trendRows.length < 2) throw new Error('no data');
      const built = buildRankTrends(tab, trendRows, rankRows || [[]], il.set);
      rankTrendsData[i] = { recs: built.recs, tab };
      html = renderRankTrends(tab, i, built);
    } else if (tab.type === 'transactions') {
      const tx = await loadTransactions();
      if (i !== active) return;
      html = renderTransactions(tx);
    } else if (tab.type === 'il') {
      const il = await loadInjuredList();
      if (i !== active) return;
      html = renderILTab(il);
    } else {
      let rows = await loadSheet(tab.sheet);
      if (i !== active) return;          // user moved on
      if (!rows || rows.length < 2) {
        $content.innerHTML = '<div class="state-msg">No data available right now — the board keeps its shape.</div>';
        setMeta('');
        return;
      }
      if (tab.sheet === 'Combined Ranks') {
        try {
          const pair = await Promise.all([
            loadSheet('Save Only Ranks'),
            loadSvHldTotals().catch(() => null),
          ]);
          if (i !== active) return;
          rows = buildCombinedRows(rows, pair[0], pair[1]);
        } catch (e) { /* columns simply omitted if the extras fail */ }
      }
      html = tab.type === 'depth' ? renderDepth(rows) : renderStatboard(rows, i);
    }
    $content.innerHTML = html;
  } catch (err) {
    if (i !== active) return;
    $content.innerHTML = '<div class="state-msg">Couldn’t reach the live data for this tab. Check your connection and reload.</div>';
    setMeta('');
  }
}

function warmCaches() {
  TABS.forEach((t, i) => {
    if (i !== active && t.sheet) loadSheet(t.sheet).catch(() => {});
    if (t.ranksSheet) loadSheet(t.ranksSheet).catch(() => {});
  });
  loadInjuredList().catch(() => {});
  loadTransactions().catch(() => {});
}

renderTabs();
show(active);
warmCaches();

/* ── Auto-refresh ──────────────────────────────────────────
   Every page load always pulls fresh data. For tabs left
   open: re-pull at 8:00 AM, 11:00 AM (new Reliever Streamers
   article/transactions) and 2:00 PM ET daily, plus whenever
   the tab has been hidden for 15+ minutes.
   ─────────────────────────────────────────────────────────── */
let lastRefresh = Date.now();
let lastSlot = '';
function refreshAll() {
  for (const k in cache) delete cache[k];
  txCache = null;
  lastRefresh = Date.now();
  show(active);
  warmCaches();
}
setInterval(() => {
  let et;
  try {
    et = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour12: false, hour: '2-digit', minute: '2-digit' }).format(new Date());
  } catch (e) { return; }
  if (et === '08:00' || et === '11:00' || et === '14:00') {
    const slot = et + '|' + new Date().toDateString();
    if (lastSlot !== slot) { lastSlot = slot; refreshAll(); }
  }
}, 30000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && Date.now() - lastRefresh > 15 * 60 * 1000) refreshAll();
});
</script>
